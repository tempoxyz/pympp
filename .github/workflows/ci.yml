name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: CI Gate
    if: always()
    needs: [test, integration, package, install-smoke]
    runs-on: ubuntu-latest
    steps:
      - env:
          ANY_FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$ANY_FAILED" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        if: matrix.python-version == '3.12'
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Add venv to PATH
        if: matrix.python-version == '3.12'
        run: echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Type check
        if: matrix.python-version == '3.12'
        uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef # v3.0.2
        with:
          version: PATH

      - name: Run tests
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          COV_REPORTS="--cov-report=term-missing"
          if [[ "$PYTHON_VERSION" == "3.12" ]]; then
            COV_REPORTS="$COV_REPORTS --cov-report=xml:coverage.xml --cov-report=html:htmlcov"
          fi
          uv run pytest -v --cov=mpp $COV_REPORTS --cov-fail-under=90

      - name: Upload coverage artifacts
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    env:
      TEMPO_TAG: latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Resolve Tempo image digest
        id: tempo-digest
        run: |
          digest=$(docker buildx imagetools inspect ghcr.io/tempoxyz/tempo:${TEMPO_TAG} --raw | sha256sum | cut -d' ' -f1)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Cache Tempo Docker image
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: docker-cache
        with:
          path: /tmp/tempo-image.tar
          key: tempo-image-${{ steps.tempo-digest.outputs.digest }}

      - name: Load cached Tempo image
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/tempo-image.tar

      - name: Pull and cache Tempo image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/tempoxyz/tempo:${TEMPO_TAG}
          docker save ghcr.io/tempoxyz/tempo:${TEMPO_TAG} -o /tmp/tempo-image.tar

      - name: Start Tempo devnet and Redis
        run: docker compose up -d --wait

      - name: Run integration tests
        run: uv run pytest -m "integration or redis" -v
        env:
          TEMPO_RPC_URL: http://localhost:8545
          REDIS_URL: redis://localhost:6379

      - name: Stop containers
        if: always()
        run: docker compose down

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Build and validate package
        run: |
          uv run python -m build
          uv run twine check --strict dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-dist
          path: dist/*
          if-no-files-found: error

  install-smoke:
    needs: package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [base, tempo, mcp]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-dist
          path: dist

      - name: Create clean virtualenv
        run: uv venv .smoke-venv --python 3.12

      - name: Install built wheel
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          WHEEL=$(echo dist/*.whl)
          case "$PROFILE" in
            base)
              INSTALL_TARGET="$WHEEL"
              ;;
            tempo)
              INSTALL_TARGET="${WHEEL}[tempo]"
              ;;
            mcp)
              INSTALL_TARGET="${WHEEL}[mcp]"
              ;;
          esac
          uv pip install --python .smoke-venv/bin/python "$INSTALL_TARGET"

      - name: Smoke test built wheel (base)
        if: matrix.profile == 'base'
        run: |
          .smoke-venv/bin/python - <<'PY'
          import mpp
          import mpp.extensions.mcp as mcp
          import mpp.methods.tempo as tempo

          assert tempo.CHAIN_ID == 4217
          assert mcp.CODE_PAYMENT_REQUIRED == -32042

          for expr, hint in (
              ("tempo.ChargeIntent", "pympp[tempo]"),
              ("mcp.PaymentRequiredError", "pympp[mcp]"),
          ):
              try:
                  eval(expr)
              except ImportError as exc:
                  assert hint in str(exc), str(exc)
              else:
                  raise AssertionError(f"{expr} unexpectedly imported in base install")

          print("base install smoke test passed")
          PY

      - name: Smoke test built wheel (tempo)
        if: matrix.profile == 'tempo'
        run: |
          .smoke-venv/bin/python - <<'PY'
          from mpp.methods.tempo import ChargeIntent, TempoAccount

          assert ChargeIntent.__name__ == "ChargeIntent"
          assert TempoAccount.__name__ == "TempoAccount"

          print("tempo install smoke test passed")
          PY

      - name: Smoke test built wheel (mcp)
        if: matrix.profile == 'mcp'
        run: |
          .smoke-venv/bin/python - <<'PY'
          from mpp.extensions.mcp import PaymentRequiredError, pay, verify_or_challenge

          assert PaymentRequiredError.__name__ == "PaymentRequiredError"
          assert pay.__name__ == "pay"
          assert verify_or_challenge.__name__ == "verify_or_challenge"

          print("mcp install smoke test passed")
          PY
